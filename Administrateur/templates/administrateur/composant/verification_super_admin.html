{% load static %}
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <title>Vérification Sécurisée | Super Admin</title>

    <link rel="shortcut icon" href="{% static 'assets/images/favicon.ico' %}">
    <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet" />
    <link href="{% static 'assets/css/app.min.css' %}" rel="stylesheet" />
</head>

<body>

<div class="auth-page-wrapper pt-5">

    <div class="auth-page-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card mt-4">
                        <div class="card-body p-4">

                            <div class="text-center">
                                <h5 class="text-primary">Vérification Sécurisée</h5>
                                <p class="text-muted">
                                    Entrez le code secret pour accéder à la création du Super Admin.
                                </p>
                            </div>

                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-info text-center">
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}

                            <form method="POST">
                                {% csrf_token %}

                                <div class="mb-3">
                                    <label class="form-label">Code Secret </label>
                                    <input type="text"
                                           name="code"
                                           maxlength="20"
                                           minlength="20"
                                           class="form-control"
                                           placeholder="Entrez le code secret"
                                           required>
                                </div>

                                <button type="submit" class="btn btn-success w-100">
                                    Vérifier
                                </button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="{% static 'assets/libs/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
